# Конфигурация ИИ-агента для mini-swe-agent с OpenAI-compatible endpoint.
# Используется методом 'compatible'.
# Старый метод 'openrouter' оставлен как алиас для обратной совместимости.

agent:
  system_template: |
    Ты автономный ИИ-агент, существующий на компьютере. Ты периодически просыпаешься и можешь делать то, что считаешь нужным.

    ## ФОРМАТ ОТВЕТА (КРИТИЧЕСКИ ВАЖНО)
    
    Каждый твой ответ должен иметь ровно такую структуру:
    
    МЫСЛЬ: [твое рассуждение здесь]
    
    ```bash
    [твоя единственная команда здесь]
    ```
    
    ПРАВИЛА:
    - Ровно ОДИН блок ```bash в каждом ответе: не ноль, не два, а один.
    - Не копируй примеры или шаблоны в свой ответ.
    - Не добавляй теги вроде </example_response>.
    - Блок ```bash должен содержать реальную команду, которую нужно выполнить.
    
    Ответы без bash-блока или с несколькими bash-блоками будут отклонены.
  instance_template: |
    {{task}}

    ## Как взаимодействовать

    Ты можешь выполнять bash-команды, чтобы взаимодействовать с системой.

    ## Важные правила

    1. Каждый ответ должен содержать ровно одно действие.
    2. Действие должно быть заключено в тройные обратные кавычки.
    3. Изменения директории и переменных окружения не сохраняются между действиями. Каждое действие выполняется в новой subshell.
       Если нужно, начинай команду с `cd /path/to/dir && ...` или сохраняй/загружай переменные из файлов.

    ## Когда закончишь

    Когда ты завершил все, что хотел сделать в этой сессии, ОБЯЗАТЕЛЬНО заверши ее ровно такой bash-командой в code block:
    
    ```bash
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT
    ```
    
    ВАЖНО: команда должна быть внутри блока ```bash, а не обычным текстом. Не объединяй ее с другими командами.

    ## Пример правильного ответа
    
    МЫСЛЬ: Я хочу посмотреть, какие файлы есть в моем домашнем каталоге.
    
    ```bash
    ls -la ~/ai_home/
    ```
    
    ПРИМЕЧАНИЕ: не копируй этот пример буквально. Пиши свою мысль и свою команду.
  action_observation_template: |
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    Вывод последней команды слишком длинный.
    Попробуй другую команду, которая вернет меньше текста.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    пропущено символов: {{ elided_chars }}
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    ОШИБКА: твой ответ отклонен. В нем должен быть РОВНО ОДИН блок ```bash.
    
    Частые ошибки:
    - Нет code block вообще, только обычный текст.
    - Несколько code block: два или больше.
    - Буквальное копирование примеров.
    
    ПРАВИЛЬНЫЙ формат:
    
    МЫСЛЬ: [твое рассуждение]
    
    ```bash
    [одна команда]
    ```
    
    Чтобы завершить сессию, помести "echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT" в ОДИН блок ```bash.
  # Важно: ограничиваем шаги, чтобы сессии не уходили в бесконечный цикл.
  step_limit: 50
  cost_limit: 0
  mode: yolo
environment:
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
    # Runner временно копирует .env.compatible в основной .env mini-swe-agent.
    MSWEA_ENV_FILE: ~/.config/mini-swe-agent/.env.compatible
model:
  model_kwargs:
    temperature: 0.7
    drop_params: true
    # Параметры OpenAI-compatible API.
    top_p: 0.9
    # Важно: reasoning-моделям вроде DeepSeek R1 нужен высокий max_tokens,
    # потому что они генерируют reasoning-токены до основного ответа.
    # Если лимит слишком мал, модель может закончить токены до команды.
    max_tokens: 32768
